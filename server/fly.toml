# fly.toml — IPv6 Diagnostic Server
#
# Deploy:
#   cd server
#   fly launch --no-deploy --copy-config --name <unique-app-name>
#   fly volumes create ipv6diag_data --region iad --size 1
#   fly deploy
#
# The app is reachable at https://<app-name>.fly.dev
# fly.io's proxy terminates TLS — HTTPS_HOST env var is not needed here.

app = 'androidipv6diag'
primary_region = 'iad'

[build]
  # Dockerfile is auto-detected in this directory (server/Dockerfile).
  # Build context is the server/ directory.

[http_service]
  internal_port = 80          # matches server default (--http-addr 0.0.0.0:80)
  force_https = true          # fly proxy redirects HTTP → HTTPS
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0    # scale to zero when idle; set to 1 to stay warm

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 25
    soft_limit = 20

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory = '256mb'

# Persistent volume for SQLite database and CertMagic cert cache.
# Create before first deploy: fly volumes create ipv6diag_data --region iad --size 1
[[mounts]]
  source = 'ipv6diag_data'
  destination = '/data'

[env]
  # fly.io handles TLS at the proxy — no HTTPS_HOST needed.
  # Set ACME_EMAIL if you bring your own domain and want CertMagic outside fly.io.
